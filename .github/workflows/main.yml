name: Remove Background from New Images

on:
  push:
    branches:
      - main
    paths:
      - "images/raw/**"

jobs:
  remove-bg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Process new images
        id: process
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          import time
          import requests
          import json
          from pathlib import Path

          HF_API_URL = "https://api-inference.huggingface.co/models/briaai/RMBG-1.4"
          HF_TOKEN = os.environ["HF_API_TOKEN"]
          HEADERS = {"Authorization": f"Bearer {HF_TOKEN}"}
          MAX_RETRIES = 3

          raw_dir = Path("images/raw")
          processed_dir = Path("images/processed")
          processed_dir.mkdir(parents=True, exist_ok=True)

          SUPPORTED_EXTENSIONS = {".jpg", ".jpeg", ".png", ".webp"}

          failed = []
          processed = []

          def call_hf_api(image_bytes, slug):
              for attempt in range(1, MAX_RETRIES + 1):
                  print(f"  Attempt {attempt}/{MAX_RETRIES}...")
                  response = requests.post(
                      HF_API_URL,
                      headers={**HEADERS, "Content-Type": "application/octet-stream"},
                      data=image_bytes,
                      timeout=120,
                  )

                  if response.status_code == 200:
                      return response.content

                  if response.status_code == 503:
                      try:
                          error_data = response.json()
                          wait_time = float(error_data.get("estimated_time", 30))
                      except Exception:
                          wait_time = 30
                      print(f"  Model loading, waiting {wait_time:.0f}s...")
                      time.sleep(wait_time)
                      continue

                  # Any other error — log and break
                  print(f"  Error {response.status_code}: {response.text[:200]}")
                  return None

              return None

          for raw_file in sorted(raw_dir.iterdir()):
              if raw_file.suffix.lower() not in SUPPORTED_EXTENSIONS:
                  continue

              slug = raw_file.stem
              output_path = processed_dir / f"{slug}.png"

              if output_path.exists():
                  print(f"Skipping {slug} — already processed")
                  continue

              print(f"Processing {raw_file.name}...")
              image_bytes = raw_file.read_bytes()
              result = call_hf_api(image_bytes, slug)

              if result:
                  output_path.write_bytes(result)
                  processed.append(slug)
                  print(f"  Saved to {output_path}")
              else:
                  failed.append(slug)
                  print(f"  FAILED after {MAX_RETRIES} attempts")

          # Write outputs for subsequent steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"processed={json.dumps(processed)}\n")
              f.write(f"failed={json.dumps(failed)}\n")

          print(f"\nDone. Processed: {processed}. Failed: {failed}")
          EOF

      - name: Commit processed images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/processed/
          if git diff --cached --quiet; then
            echo "No new processed images to commit"
          else
            git commit -m "chore: process background removal for new images"
            git push
          fi

      - name: Open issue on failure
        if: ${{ steps.process.outputs.failed != '[]' && steps.process.outputs.failed != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const failed = JSON.parse('${{ steps.process.outputs.failed }}');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            for (const slug of failed) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[bg-removal] Failed to process images/raw/${slug}`,
                body: [
                  `The background removal Action failed to process \`images/raw/${slug}\` after 3 retries.`,
                  ``,
                  `**What to check:**`,
                  `- Is \`HF_API_TOKEN\` set correctly in repository secrets?`,
                  `- Is the file a supported format (.jpg, .jpeg, .png, .webp)?`,
                  `- Is the Hugging Face API status healthy? https://status.huggingface.co`,
                  ``,
                  `**To retry:** Delete \`images/processed/${slug}.png\` if it exists, then push any change to trigger the Action again.`,
                  ``,
                  `**Failed Action run:** ${runUrl}`,
                ].join("\n"),
                labels: ["bug"],
              });
            }
