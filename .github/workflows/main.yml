name: Remove Background from New Images

on:
  push:
    branches:
      - main
    paths:
      - "images/raw/**"

jobs:
  remove-bg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache rembg model
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: rembg-u2net-model

      - name: Install dependencies
        run: pip install "rembg[cpu]" Pillow

      - name: Process new images
        id: process
        run: |
          python - <<'EOF'
          import json
          import os
          from pathlib import Path

          from rembg import remove

          raw_dir = Path("images/raw")
          processed_dir = Path("images/processed")
          processed_dir.mkdir(parents=True, exist_ok=True)

          SUPPORTED_EXTENSIONS = {".jpg", ".jpeg", ".png", ".webp"}

          failed = []
          processed = []

          for raw_file in sorted(raw_dir.iterdir()):
              if raw_file.suffix.lower() not in SUPPORTED_EXTENSIONS:
                  continue

              slug = raw_file.stem
              output_path = processed_dir / f"{slug}.png"

              if output_path.exists():
                  print(f"Skipping {slug} — already processed")
                  continue

              print(f"Processing {raw_file.name}...")
              try:
                  result = remove(raw_file.read_bytes())
                  output_path.write_bytes(result)
                  processed.append(slug)
                  print(f"  Saved to {output_path}")
              except Exception as e:
                  failed.append(slug)
                  print(f"  FAILED: {e}")

          # Write outputs for subsequent steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"processed={json.dumps(processed)}\n")
              f.write(f"failed={json.dumps(failed)}\n")

          print(f"\nDone. Processed: {processed}. Failed: {failed}")
          EOF

      - name: Commit processed images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/processed/
          if git diff --cached --quiet; then
            echo "No new processed images to commit"
          else
            git commit -m "chore: process background removal for new images"
            git push
          fi

      - name: Open issue on failure
        if: ${{ steps.process.outputs.failed != '[]' && steps.process.outputs.failed != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const failed = JSON.parse('${{ steps.process.outputs.failed }}');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            for (const slug of failed) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[bg-removal] Failed to process images/raw/${slug}`,
                body: [
                  `The background removal Action failed to process \`images/raw/${slug}\`.`,
                  ``,
                  `**What to check:**`,
                  `- Is the file a supported format (.jpg, .jpeg, .png, .webp)?`,
                  `- Check the failed Action run logs for the specific error.`,
                  ``,
                  `**To retry:** Delete \`images/processed/${slug}.png\` if it exists, then push any change to trigger the Action again.`,
                  ``,
                  `**Failed Action run:** ${runUrl}`,
                ].join("\n"),
                labels: ["bug"],
              });
            }
